services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - praxis-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  praxis:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PRAXIS_TRANSPORT: streamable-http
      PRAXIS_HOST: 0.0.0.0
      PRAXIS_PORT: "8000"
      PRAXIS_DB: /data/praxis.sqlite
      PRAXIS_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - praxis-data:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import sys; from praxis.health import health_report; sys.exit(0 if health_report().get('status') == 'ok' else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  praxis-data:
  praxis-redis:

name: ci

# dec-107 — validation strategy. Lint, compile, and router/resilience tests
# under both provider profiles (free, paid). dec-106 defines the profile system.

on:
  pull_request:
  push:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install ruff
        run: pip install "ruff>=0.4.0"
      # TODO(dec-107): expand to `src/ tests/` once the existing lint debt
      # outside router/resilience is cleared. Today the broader scope has
      # 22 pre-existing UP/I001/F401/E501 findings. Tracked separately.
      - name: ruff check (router + resilience)
        run: ruff check src/axon/router src/axon/resilience tests/router tests/resilience

  compile:
    name: compileall
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: compileall src
        run: python3 -m compileall -q src

  test:
    name: pytest (${{ matrix.profile }} / py${{ matrix.python }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
        profile: [free, paid]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: install project + dev deps
        run: pip install -e ".[dev]"
      - name: pytest router + resilience + config
        env:
          AXON_PROVIDER_PROFILE: ${{ matrix.profile }}
        run: python3 -m pytest tests/router tests/resilience tests/config -q

  profile-smoke:
    name: profile import smoke (${{ matrix.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        profile: [free, paid]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: install project
        run: pip install -e .
      - name: import and resolve profile
        env:
          AXON_PROVIDER_PROFILE: ${{ matrix.profile }}
        run: |
          python3 -c "
          from axon.router.profiles import get_profile, available_profiles
          from axon.router.engine import _MODEL_MAP, _COST_PER_1K, _PROFILE
          assert _PROFILE.name == '${{ matrix.profile }}'
          assert _MODEL_MAP, 'model map empty'
          assert all(v for v in _MODEL_MAP.values()), 'unmapped task type'
          print('profile:', _PROFILE.name)
          print('models:', dict(_MODEL_MAP))
          "

  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      # Upgrade pip and setuptools first — the bootstrap setuptools this Python
      # version's venv ships (65.5.0) carries known CVEs with fixes available,
      # so upgrade before install rather than suppress.
      - name: upgrade pip and setuptools
        run: pip install --upgrade pip setuptools
      - name: install project + dev deps
        run: pip install -e ".[dev]"
      - name: run pip-audit
        run: pip-audit

  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_ENABLE_COMMENTS: "false"

  dast:
    name: OWASP ZAP (dynamic security scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: install project (http extra for FastAPI server)
        run: pip install -e ".[http]"
      - name: boot AXON HTTP server in background
        run: |
          python3 -m uvicorn axon.http.app:app --host 127.0.0.1 --port 8765 > /tmp/axon-http.log 2>&1 &
          echo $! > /tmp/server.pid
          echo "Server PID: $(cat /tmp/server.pid)"
      - name: wait for server readiness
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8765/health; then
              echo "✓ Server is ready"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done
          echo "✗ Server failed to start within 30 seconds"
          cat /tmp/axon-http.log
          exit 1
      - name: run OWASP ZAP baseline scan (non-blocking)
        uses: zaproxy/action-baseline@v0.15.0
        with:
          docker_name: "ghcr.io/zaproxy/zaproxy:2.17.0"
          target: "http://127.0.0.1:8765"
          fail_action: false
          allow_issue_writing: false
          artifact_name: "dast-zap-baseline-report"
        continue-on-error: true
      - name: cleanup (stop server)
        if: always()
        run: |
          SERVER_PID=$(cat /tmp/server.pid 2>/dev/null)
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
            echo "Server stopped (PID: $SERVER_PID)"
          fi
          if [ -f /tmp/axon-http.log ]; then
            echo "=== Server log ===" >&2
            cat /tmp/axon-http.log >&2
          fi

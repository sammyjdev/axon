[project]
name = "praxis"
version = "0.1.0"
description = "Praxis — LangGraph task-orchestration engine with an MCP interface"
requires-python = ">=3.11,<4.0"
readme = "README.md"
license = "MIT"
authors = [{ name = "Praxis contributors" }]
keywords = ["langgraph", "mcp", "orchestration", "agents", "task-graph"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "mcp[cli]>=1.2.0",
    "langgraph>=0.2.0",
    "langgraph-checkpoint-sqlite>=2.0.0",
    "typer>=0.12.0",
    "python-dotenv>=1.0.0",
]

[project.urls]
Homepage = "https://github.com/sammyjdev/Praxis"
Repository = "https://github.com/sammyjdev/Praxis"

[project.scripts]
praxis-server = "praxis.server:main"

[tool.poetry]
packages = [{ include = "praxis", from = "src" }]

[tool.poetry.group.dev.dependencies]
pytest = ">=8.0.0"
pytest-asyncio = ">=0.23.0"
ruff = ">=0.4.0"
mypy = ">=1.10.0"

[build-system]
requires = ["poetry-core>=2.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests/praxis"]

[tool.ruff]
target-version = "py311"
line-length = 100
# Legacy Prometheus code is parked, not part of the Praxis project. The Praxis
# test suite lives in tests/praxis and is linted via `ruff check tests/praxis`.
extend-exclude = ["src/prometheus", "src/embedder", "scripts", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.11"
mypy_path = "src"
namespace_packages = true
explicit_package_bases = true
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_defs = true
exclude = '^src/(prometheus|embedder)/'

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "axon-mcp"
version = "0.1.0"
description = "Self-hosted second-brain engine for local context retrieval and tooling"
requires-python = ">=3.11"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Prometheus contributors" }]
keywords = ["rag", "cli", "knowledge-base", "local-first", "second-brain"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "fastembed>=0.4.0",
    "qdrant-client>=1.9.0",
    "redis>=5.0.0",
    "watchdog>=4.0.0",
    "tree-sitter>=0.23.0",
    "tree-sitter-java>=0.23.0",
    "tree-sitter-python>=0.23.0",
    "tree-sitter-typescript>=0.23.0",
    "litellm>=1.40.0",
    "mcp[cli]>=1.0.0",
    "typer>=0.12.0",
    "ollama>=0.2.0",
    "aiosqlite>=0.20.0",
    "python-dotenv>=1.0.0",
    "mem0ai>=0.1.0",
    "pydantic>=2.0",
    "structlog>=24.0",
    "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://github.com/sammyjdev/axon"
Repository = "https://github.com/sammyjdev/axon"

[project.scripts]
axon = "axon.cli.pb:app"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.4.0",
    "testcontainers[qdrant,redis]>=4.0.0",
    "hypothesis>=6.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/axon"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
